# The test and docs jobs are duplicated into release.yml (a tag push triggers
# no CI run, so the release re-runs the gate itself). When editing those jobs
# here, mirror the change there by hand.

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # macos is not ceremony: pypdfium2 ships platform-specific native
        # wheels, so the second OS exercises a different pdfium binary.
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
      - run: uv sync --locked
      - run: uv run ruff format --check
      - run: uv run ruff check
      - run: uv run pyright
      - run: uv run pytest

  # A docs build is platform-independent, so this job runs on ubuntu only; the
  # pytest matrix above covers both OSes.
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
      - run: uv sync --locked
      - run: uv run mkdocs build --strict
      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  # Deployment uses the Pages artifact actions, so no gh-pages branch ever
  # exists. One-time repository setup: set the Pages source to "GitHub Actions".
  deploy-docs:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: docs
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
