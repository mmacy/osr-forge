geometry:
  halfling-home/1:
    areas:
      h2:
        # The printed living room (map p. 19, 1 square = 5') spans the width
        # of the burrow under H3/H4 — five 10' cells by two.
        cells: [[3, 9], [4, 9], [5, 9], [6, 9], [7, 9], [3, 10], [4, 10], [5, 10], [6, 10], [7, 10]]
      h3:
        # The 15' x 17' dining room (p. 14) sits north of the living room's
        # west half on the printed map, not west of it in a chain.
        cells: [[5, 7], [6, 7], [5, 8], [6, 8]]
    edges:
      # h3's interior and its opening south into h2.
      "6,7:west": { kind: open }
      "6,8:west": { kind: open }
      "5,8:north": { kind: open }
      "6,8:north": { kind: open }
      "5,9:north": { kind: open }
      # h2's second row, opened where the old corridor never ran.
      "5,10:west": { kind: open }
      "6,10:west": { kind: open }
      "5,10:north": { kind: open }
      # The round green front door (H1, p. 14): "locked, but is old and
      # rotten, and can be easily knocked in" — a stuck door in play (no key
      # exists anywhere; forcing is the module's own remedy).
      "8,9:east": { kind: door, door: { stuck: true } }
    reason: >-
      Match the printed halfling-home map (p. 19): H2 is the wide living
      room, H3 the dining room north of it, and the front door at H1 is
      knock-in-able, not open.
