# JN1 The Chaotic Caves (r28) — the phase 3 correction session's file.
#
# Worked against the committed stage caches through the documented loop
# (read report.json and the previews, edit this file, assemble && check,
# repeat). Every entry cites the module page it was checked against; the
# stat-block comparisons are against the OSE SRD catalog osrlib ships.
# Text quoted or adapted from the module is CC BY-SA 4.0 (see README.md).

monsters:
  "gray jelly":
    template_id: grey_ooze
    reason: >-
      The module's stat block (p. 19: AC 12, HD 3*, Dam 2d8, Mv 1') matches
      Grey Ooze (HD 3*, 2d8, near-immobile), not the LLM's Ochre Jelly pick
      (HD 5*, 2d6).
  "tentacle worm":
    template_id: carcass_crawler
    reason: >-
      The module's stat block (p. 14: AC 13, HD 3*, 6 tentacles, paralysis)
      is the carcass crawler under another name.
  "giant gecko lizard":
    template_id: gecko
    reason: >-
      Identical stat block (p. 30: AC 15, HD 3+1, bite 1d8) — OSE's Gecko is
      the giant gecko lizard; the extracted name just didn't fuzzy-match.
  "orc war leader":
    template_id: orc
    reason: >-
      A 2 HD orc (p. 13/23); the catalog has no orc leader variant, and the
      base orc is the same creature. The leader's extra hit die and +1 damage
      are lost — acceptable for a lieutenant.
  "elven thief":
    template_id: elf_monster
    reason: >-
      The bandit lieutenant is an Elven Thief 3 (p. 28); the catalog's elf
      entry is the elf NPC under arms. The two thief levels are lost.
  "fighters":
    template_id: veteran_2
    reason: >-
      The manor hall's three fighters are F2s (p. 41: "3 Fighters: AC 15,
      F2, Dam 1d8"); OSE's Veteran (2) is the 2nd-level fighter NPC.
  "human fighter 1":
    template_id: veteran_1
    reason: >-
      The band's foot troops are 1st-level human fighters (pp. 39-42); OSE's
      Veteran (1) is the 1st-level fighter NPC.
  "human fighter 2":
    template_id: veteran_2
    reason: >-
      The sergeants and the smith are 2nd-level fighters (p. 41); OSE's
      Veteran (2) is the 2nd-level fighter NPC.
  "human cleric 3":
    template_id: acolyte
    reason: >-
      The catalog's only NPC cleric. The module's C3 in plate with mace
      (p. 43) is the acolyte's exact kit two levels up.
  "human magic-user 4":
    template_id: medium
    reason: >-
      The catalog's only arcane NPC (MU1). The module's MU4 (p. 43) loses
      three levels; the alternative is inventing a monster, which osr-forge
      never does.

